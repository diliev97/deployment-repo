# ArgoCD Image Updater configuration for simple-app
# This file enables automatic image updates for the dev environment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-app-dev
  namespace: argocd
  annotations:
    # Image updater configuration
    argocd-image-updater.argoproj.io/image-list: image=ghcr.io/diliev97/simple-app
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: master
    # Update when new image tag matches pattern
    argocd-image-updater.argoproj.io/image.update-strategy: semver
    argocd-image-updater.argoproj.io/image-name: image
spec:
  source:
    helm:
      parameters:
        - name: image.tag
          value: "dev"