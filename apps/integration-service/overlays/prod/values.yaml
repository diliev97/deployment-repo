replicaCount: 2

image: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8083

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

nodeSelector:
  environment: prod

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: integration-service.yourdomain.com
      paths:
        - path: /
          pathType: ImplementationSpecific

springProfiles: "prod"

externalSecrets:
  enabled: true
  refreshInterval: 15m
  ssbSecretName: "integration-service-ssb-credentials"
  secretStoreName: "vault-backend"
  secretStorePrefix: "secret/integration-service"