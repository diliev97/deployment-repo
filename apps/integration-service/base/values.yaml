replicaCount: 1

image:
  repository: ghcr.io/diliev97/integration-service
  pullPolicy: IfNotPresent
  tag: "latest-dev"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

podAnnotations: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8083

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: integration-service.local
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}

# HPA Configuration
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# External Secrets Configuration - only for credentials
externalSecrets:
  enabled: true
  refreshInterval: 1h
  ssbSecretName: "integration-service-ssb-credentials"

# SSB Configuration (non-secret values in values.yaml)
ssb:
  baseUrl: ""
  tokenUrl: ""
  scope: "ssb"