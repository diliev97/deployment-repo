{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.ssbSecretName }}
  labels:
    {{- include "integration-service.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName | default "vault-backend" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecrets.ssbSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: ssb-base-url
      remoteRef:
        key: {{ .Values.externalSecrets.secretStorePrefix | default "secret/integration-service" }}/ssb
        property: base-url
    - secretKey: ssb-token-url
      remoteRef:
        key: {{ .Values.externalSecrets.secretStorePrefix | default "secret/integration-service" }}/ssb
        property: token-url
    - secretKey: ssb-client-id
      remoteRef:
        key: {{ .Values.externalSecrets.secretStorePrefix | default "secret/integration-service" }}/ssb
        property: client-id
    - secretKey: ssb-client-secret
      remoteRef:
        key: {{ .Values.externalSecrets.secretStorePrefix | default "secret/integration-service" }}/ssb
        property: client-secret
    - secretKey: ssb-username
      remoteRef:
        key: {{ .Values.externalSecrets.secretStorePrefix | default "secret/integration-service" }}/ssb
        property: username
    - secretKey: ssb-password
      remoteRef:
        key: {{ .Values.externalSecrets.secretStorePrefix | default "secret/integration-service" }}/ssb
        property: password
    - secretKey: ssb-scope
      remoteRef:
        key: {{ .Values.externalSecrets.secretStorePrefix | default "secret/integration-service" }}/ssb
        property: scope
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "integration-service.fullname" . }}-config
  labels:
    {{- include "integration-service.labels" . | nindent 4 }}
data:
  INTEGRATION_SERVICE_PORT: "{{ .Values.service.targetPort }}"
  SPRING_PROFILES_ACTIVE: "{{ .Values.springProfiles | default "local" }}"
{{- end }}