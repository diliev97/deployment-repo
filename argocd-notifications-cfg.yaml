apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cfg
  namespace: argocd
data:
  service.ms-teams: |
    # Replace <YOUR-MS-TEAMS-WEBHOOK-URL> with your actual MS Teams Incoming Webhook URL
    url: <YOUR-MS-TEAMS-WEBHOOK-URL>

  trigger.on-image-update: |
    - when: >-
        app.status.operationState.phase == "Succeeded" and
        app.status.operationState.operationInitiatedBy matches ".*image-updater.*"
      send: [ms-teams]
      template: ms-teams

  trigger.on-sync-succeeded: |
    - when: >-
        app.status.operationState.phase == "Succeeded" and
        not(app.status.operationState.operationInitiatedBy matches ".*image-updater.*")
      send: [ms-teams]
      template: ms-teams

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase == "Failed"
      send: [ms-teams]
      template: ms-teams

  trigger.on-health-degraded: |
    - when: app.status.health.status == "Degraded"
      send: [ms-teams]
      template: ms-teams

  trigger.on-health-healthy: |
    - when: >-
        app.status.health.status == "Healthy" and
        app.status.health.previousHealth == "Degraded"
      send: [ms-teams]
      template: ms-teams

  trigger.on-drift-detected: |
    - when: app.status.status == "OutOfSync"
      send: [ms-teams]
      template: ms-teams