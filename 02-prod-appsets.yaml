apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-prod
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/diliev97/deployment-repo
        revision: master
        directories:
          - path: apps/*/base
  template:
    metadata:
      name: "{{path[1]}}-prod"
      labels:
        app: "{{path[1]}}"
        env: prod
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd-image-updater.argoproj.io/image-list: "image=ghcr.io/diliev97/{{path[1]}}:*-prod"
        argocd-image-updater.argoproj.io/write-back-method: git
        argocd-image-updater.argoproj.io/git-branch: master
    spec:
      project: default
      sources:
        - repoURL: https://github.com/yourorg/deployment-repo
          targetRevision: master
          path: "apps/{{path[1]}}/base"
          helm:
            valueFiles:
              - "../overlays/prod/values.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path[1]}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: false  # Disable auto-heal for prod - require manual approval
          allowEmpty: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m