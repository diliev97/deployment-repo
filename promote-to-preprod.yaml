trigger: none

pr: none

parameters:
  - name: source_branch
    displayName: "release/YYYY-MM-DD or hotfix/YYYY-MM-DD"
    type: string

variables:
  TARGET_BRANCH: preprod
  ACR_NAME: myregistry             # change
  ACR_LOGIN_SERVER: myregistry.azurecr.io
  IMAGE_NAME: simple-app           # change
  AZURE_DEVOPS_ORG: your-org       # change
  AZURE_DEVOPS_PROJECT: your-project # change

stages:

# =========================================================
# 1️⃣ VALIDATE PROMOTION ORDER
# =========================================================
- stage: Validate
  jobs:
    - job: ValidatePromotion
      pool:
        vmImage: ubuntu-latest

      steps:
        - checkout: self
          fetchDepth: 0

        - bash: |
            BRANCH="${{ parameters.source_branch }}"

            if [[ "$BRANCH" == release/* ]]; then
              VERSION="${BRANCH#release/}"
              echo "Release version: $VERSION"

              git fetch origin $(TARGET_BRANCH)

              LAST_PROMOTION=$(git log origin/$(TARGET_BRANCH) \
                --grep="Promoted:" \
                -1 \
                --pretty=format:"%s" || true)

              echo "Last promotion: $LAST_PROMOTION"

              if [ -z "$LAST_PROMOTION" ]; then
                echo "First promotion allowed."
                exit 0
              fi

              LAST_DATE=$(echo "$LAST_PROMOTION" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
              
              if [[ "$LAST_DATE" > "$VERSION" ]]; then
                echo "ERROR: Newer release already promoted."
                exit 1
              fi

              echo "Promotion order validation passed."
            fi
          displayName: "Validate release order"

# =========================================================
# 2️⃣ CREATE PR
# =========================================================
- stage: CreatePR
  dependsOn: Validate
  jobs:
    - job: CreatePullRequest
      pool:
        vmImage: ubuntu-latest

      steps:
        - checkout: self

        - bash: |
            BRANCH="${{ parameters.source_branch }}"
            BASE="$(TARGET_BRANCH)"

            echo "Creating PR from $BRANCH → $BASE"

            PR_RESPONSE=$(curl -s -u :$(System.AccessToken) \
              -X POST \
              -H "Content-Type: application/json" \
              https://dev.azure.com/$(AZURE_DEVOPS_ORG)/$(AZURE_DEVOPS_PROJECT)/_apis/git/repositories/$(Build.Repository.ID)/pullrequests?api-version=7.0 \
              -d "{
                    \"sourceRefName\": \"refs/heads/$BRANCH\",
                    \"targetRefName\": \"refs/heads/$BASE\",
                    \"title\": \"Promote: $BRANCH to preprod\",
                    \"description\": \"Promotion to preprod environment\"
                  }")

            echo $PR_RESPONSE

            PR_ID=$(echo $PR_RESPONSE | jq -r '.pullRequestId')

            echo "PR ID: $PR_ID"

            echo "##vso[task.setvariable variable=PR_ID;isOutput=true]$PR_ID"
          name: createPR
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

# =========================================================
# 3️⃣ WAIT FOR MERGE
# =========================================================
- stage: WaitForMerge
  dependsOn: CreatePR
  jobs:
    - job: WaitJob
      pool:
        vmImage: ubuntu-latest

      variables:
        PR_ID: $[ stageDependencies.CreatePR.CreatePullRequest.outputs['createPR.PR_ID'] ]

      steps:
        - bash: |
            echo "Waiting for PR $(PR_ID)"

            for i in {1..180}; do

              RESPONSE=$(curl -s -u :$(System.AccessToken) \
                https://dev.azure.com/$(AZURE_DEVOPS_ORG)/$(AZURE_DEVOPS_PROJECT)/_apis/git/repositories/$(Build.Repository.ID)/pullrequests/$(PR_ID)?api-version=7.0)

              STATUS=$(echo $RESPONSE | jq -r '.status')

              echo "Status: $STATUS"

              if [[ "$STATUS" == "completed" ]]; then
                echo "PR merged."
                exit 0
              fi

              if [[ "$STATUS" == "abandoned" ]]; then
                echo "PR closed without merge."
                exit 1
              fi

              sleep 20
            done

            echo "Timeout waiting for merge."
            exit 1
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

# =========================================================
# 4️⃣ PROMOTE IMAGE TO PREPROD (ACR)
# =========================================================
- stage: Promote
  dependsOn: WaitForMerge
  jobs:
    - job: PromoteImage
      pool:
        vmImage: ubuntu-latest

      steps:
        - checkout: self

        - task: Docker@2
          displayName: Login to ACR
          inputs:
            containerRegistry: my-acr-service-connection   # <-- create this
            command: login

        - bash: |
            BRANCH="${{ parameters.source_branch }}"

            if [[ "$BRANCH" == release/* ]]; then
              VERSION="${BRANCH#release/}"

              echo "Retagging release image for $VERSION"

              docker pull $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$VERSION-release

              docker tag \
                $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$VERSION-release \
                $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$VERSION-preprod

              docker push \
                $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$VERSION-preprod

              echo "Release promotion complete."
            fi

            if [[ "$BRANCH" == hotfix/* ]]; then
              VERSION="${BRANCH#hotfix/}"

              echo "Building hotfix image $VERSION"

              docker build \
                -t $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$VERSION-preprod \
                .

              docker push \
                $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$VERSION-preprod

              echo "Hotfix promotion complete."
            fi
          displayName: Promote image